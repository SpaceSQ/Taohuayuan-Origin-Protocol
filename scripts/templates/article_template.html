<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 桃花源新闻中心</title>
    <meta name="description" content="{{ seo_desc }}">
    <meta name="keywords" content="{{ keywords }}, Taohuayuan, S2-DID">
    <meta name="geo.region" content="CN-43" />
    <meta name="geo.placename" content="Taohuayuan, Changde" />
    <meta name="geo.position" content="28.9;111.4" />

    <style>
        /* ========================================== */
        /* 1. 全局变量与核心极客背景 (对齐官网) */
        /* ========================================== */
        :root { 
            --bg-color: #050508; 
            --peach: #ff6b81; 
            --cyan: #00f3ff; 
            --text-main: #e2e8f0; 
            --glass-bg: rgba(20, 20, 30, 0.6);
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            line-height: 1.6;
        }
        
        /* 容器布局 */
        .container { 
            max-width: 850px; 
            margin: 60px auto; 
            padding: 40px; 
            background: var(--glass-bg); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ========================================== */
        /* 2. 文章头部元数据 */
        /* ========================================== */
        header {
            border-bottom: 2px solid var(--peach);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1 { 
            color: #fff; 
            font-size: 2.5rem; 
            margin-top: 0;
            margin-bottom: 15px; 
            line-height: 1.3;
        }
        .meta-info { 
            color: var(--cyan); 
            font-family: 'Courier New', monospace; 
            font-size: 0.95rem; 
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .meta-tag {
            background: rgba(0, 243, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        /* ========================================== */
        /* 3. 🌟 精修版 Markdown 正文排版 🌟 */
        /* ========================================== */
        .markdown-body { 
            line-height: 1.8; 
            color: #d1d5db; 
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }
        /* 强制段落之间有明显的间距 */
        .markdown-body p { 
            margin-bottom: 1.5em; 
            margin-top: 0;
        }
        /* 标题间距与颜色 */
        .markdown-body h2 { 
            color: var(--cyan); 
            margin-top: 2.5em; 
            margin-bottom: 1em;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 8px;
        }
        .markdown-body h3 { 
            color: var(--peach); 
            margin-top: 2em; 
            margin-bottom: 0.8em;
        }
        /* 列表排版 */
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5em;
            padding-left: 2em;
        }
        .markdown-body li {
            margin-bottom: 0.5em;
        }
        /* 保证图片居中且不会超出边界，带发光阴影 */
        .markdown-body img { 
            max-width: 100%; 
            height: auto;
            border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            display: block;
            margin: 2.5em auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        /* 代码块极客化 */
        .markdown-body code { 
            background: #000; 
            color: #ffb86c; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.9em;
        }
        .markdown-body pre { 
            background: #050508; 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 8px; 
            overflow-x: auto; 
            color: #8be9fd; 
            margin: 2em 0;
        }
        .markdown-body pre code {
            background: transparent;
            color: inherit;
            padding: 0;
            border-radius: 0;
        }
        /* 引用块样式 */
        .markdown-body blockquote {
            border-left: 4px solid var(--peach);
            padding-left: 20px;
            margin: 2em 0;
            color: #a0aec0;
            font-style: italic;
            background: rgba(255,107,129,0.05);
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }
        .markdown-body strong {
            color: #fff;
        }
        
        /* ========================================== */
        /* 4. 底部导航与 API 链接 */
        /* ========================================== */
        .footer-nav {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px dashed #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .back-nav { 
            display: inline-block; 
            padding: 12px 25px; 
            border: 1px solid var(--cyan); 
            color: var(--cyan); 
            text-decoration: none; 
            border-radius: 4px; 
            transition: 0.3s; 
            font-weight: bold;
            text-align: center;
            width: max-content;
        }
        .back-nav:hover { 
            background: var(--cyan); 
            color: #000; 
            box-shadow: 0 0 15px var(--cyan); 
        }
        .ai-link { 
            color: #6b7280; 
            font-family: 'Courier New', monospace; 
            text-decoration: none; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-link:hover { color: var(--peach); }
        
        /* 手机端适配 */
        @media (max-width: 768px) {
            .container { margin: 20px; padding: 25px; }
            h1 { font-size: 1.8rem; }
        }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "{{ title }}",
      "datePublished": "{{ published_at }}",
      "author": {"@type": "Organization", "name": "Taohuayuan World Model"}
    }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ title }}</h1>
            <div class="meta-info">
                <span class="meta-tag">CHANNEL: {{ category | upper }}</span>
                <span class="meta-tag">DATE: {{ published_at }}</span>
            </div>
        </header>
        
        <article class="markdown-body">
            {{ content_html | safe }}
        </article>

        <div class="footer-nav">
            <a href="/#news-hub" class="back-nav">&lt; 返回桃花源主脑 (Back to Matrix)</a>
            <a href="/{{ category }}/{{ slug }}.md" class="ai-link" rel="alternate" type="text/markdown">
                🤖 [AI Agent] Access raw Markdown data for this node
            </a>
        </div>
    </div>
</body>
</html>
